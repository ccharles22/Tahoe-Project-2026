site_name: Direct Evolution Monitoring Portal User Guide Documentation
site_description: Unified docs for parsing, metrics, visualisation, and bonus workflows
site_author: BIO727P Group Project Team
site_url: https://tahoe-docs.example.com/
docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: theme
  logo: ../app/static/img/webpage_tahoe_logo.png
  favicon: ../app/static/img/webpage_tahoe_favicon_v2.png
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/homepage-header.css

nav:
  - Home Guide: index.md
  - Staging: staging_docs/index.md
  - Parsing & QC:
      - Overview: parsing_qc/index.md
      - User Guide:
          - Getting Started: parsing_qc/guide/getting-started.md
          - Uploading Data: parsing_qc/guide/uploading-data.md
          - File Formats: parsing_qc/guide/file-formats.md
      - Quality Control:
          - Overview: parsing_qc/qc/overview.md
          - Threshold System: parsing_qc/qc/thresholds.md
          - Validation Checks: parsing_qc/qc/validation-checks.md
      - API Reference:
          - Endpoints: parsing_qc/api/endpoints.md
      - Troubleshooting: parsing_qc/troubleshooting.md
      - Project Docs:
          - Architecture: parsing_qc/architecture.md
          - Parsing & QC Manual: parsing_qc/parsing_qc_manual.md
  - Database & Schema:
      - Database Overview: postgresql_visualization/database.md
      - Schema Notes: postgresql_visualization/schema_design_notes.md
      - Bonus Database Notes: bonus_visualisations/database/connection.md
  - Metric Computations:
      - Metrics Overview: postgresql_visualization/metrics.md
      - Metric Storage & Types: postgresql_visualization/metric_storage_and_types.md
      - Activity Score Calculations: postgresql_visualization/activity_score_calculations.md
      - Metric QC & Validation: postgresql_visualization/metric_qc_and_validation.md
  - Visualisation Guide:
      - Overview: postgresql_visualization/index.md
      - Plots:
          - Overview: postgresql_visualization/plots.md
          - Lineage: postgresql_visualization/plots_lineage.md
          - Distribution: postgresql_visualization/plots_distribution.md
          - Top 10: postgresql_visualization/plots_top10.md
          - Protein Network: postgresql_visualization/plots_protein_network.md
      - Pipelines: postgresql_visualization/pipeline.md
      - User Guide: postgresql_visualization/user_guide.md
  - Bonus Visualisations:
      - Guide Overview: bonus_visualisations/index.md
      - Activity Landscape: bonus_visualisations/visualisations/activity-landscape.md
      - Mutation Fingerprinting: bonus_visualisations/visualisations/mutation-fingerprint.md
      - Domain Enrichment Heatmap: bonus_visualisations/visualisations/domain-enrichment.md
      - Mutation Frequency: bonus_visualisations/visualisations/mutation-frequency.md
      - Pipeline Usage: bonus_visualisations/pipeline/usage.md
      - CLI Reference: bonus_visualisations/pipeline/cli-reference.md
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra:
  generator: false

extra_css:
  - parsing_qc/stylesheets/extra.css
  - stylesheets/app_guidebar.css

extra_javascript:
  - javascripts/app_guidebar.js
