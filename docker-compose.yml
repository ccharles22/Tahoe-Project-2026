services:
  db:
    image: postgres:16
    container_name: tahoe_pg
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tahoe_dev
    ports:
      - "5432:5432"
    volumes:
      - tahoe_pg_data:/var/lib/postgresql/data

volumes:
  tahoe_pg_data:
