<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Home</title>
  <style>
    /*
      Theme (Blue / Yellow / Pink)

      This commented CSS defines a small design system using CSS variables:
      - --primary   : the main blue color (used for headers, primary buttons)
      - --highlight : yellow used for badges and highlights
      - --accent    : pink used for complementary accents and secondary buttons

      To customize the look, change the hex values below. The variables are
      defined on :root so they apply across templates that include this block.
    */
    :root {
      --blue-50: #EBF5FF;    /* very light blue background */
      --blue-500:#1E90FF;    /* primary blue */
      --blue-700:#0B61D9;    /* darker blue for contrast */
      --yellow-500:#FFD54F;  /* highlight / badge */
      --pink-500:#FF6FA3;    /* accent color */

      --bg: var(--blue-50);
      --primary: var(--blue-500);
      --accent: var(--pink-500);
      --highlight: var(--yellow-500);
    }

    /* Example utility classes and usage notes:
       - .header uses --primary as background
       - .btn-primary uses --primary
       - .btn-accent uses --accent
       - .badge uses --highlight
    */
    html,body {height:100%;}
    body {font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial; background:var(--bg); color:#03304b; margin:0}
    .header{background:var(--primary); color:#fff; padding:1.25rem 1rem; text-align:center}
    .container{max-width:900px; margin:2rem auto; padding:1rem}
    .card{background:white;border-radius:8px;padding:1.25rem;box-shadow:0 6px 18px rgba(3,48,75,0.06)}
    .btn{display:inline-block;padding:.5rem 1rem;border-radius:6px;text-decoration:none;color:white}
    .btn-primary{background:var(--primary)}
    .btn-accent{background:var(--accent)}
    .badge{display:inline-block;background:var(--highlight);color:#111;padding:.25rem .5rem;border-radius:999px;font-weight:700}

    /* Accessibility note:
       - Keep sufficient contrast for text on top of --primary and --accent.
       - Use --blue-700 as a darker fallback for critical text when needed.
    */
  </style>
</head>
<body>
  <header class="header">
    <h1>Welcome to the Direct Evolution Monitoring
Web Portal</h1>
    <!-- The header uses the primary blue color from the theme variables above. -->
  </header>

  <main class="container">
    <section class="card">
      <p>This is the home page. Register or Login using your account details to access the application features.</p>

      <p>
        <a href="{{ url_for('register') }}" class="btn btn-primary">Create account</a>
        <a href="{{ url_for('login') }}" class="btn btn-accent" style="margin-left:.5rem">Sign in</a>
      </p>

      <p style="margin-top:.75rem"><span class="badge">Tip</span> To register selecet create account.</p>

      <!-- Explanatory comments:
           - The CSS variables are declared in :root at the top of this file.
           - Use the example classes (.btn-primary, .btn-accent, .badge) throughout
             your templates to keep consistent styling.
           - For a site-wide change, consider moving the <style> block to a
             static CSS file and referencing it from all templates.
      -->
    </section>
  </main>
</body>
</html>
